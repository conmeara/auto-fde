<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plugin Review</title>
<style>
/* ============================================================
   Auto-FDE review page — generic template.
   Renders exclusively from window.FDE_DATA (see DATA-CONTRACT.md).
   Warm editorial design system: ivory/oat ground, carbon ink,
   terracotta accent, serif display headings + Inter body.
   Self-contained: no external requests. Serif/sans/mono stacks
   fall back to system fonts.
   ============================================================ */
:root {
  /* ground & surface */
  --bg:            #faf9f5;
  --bg-warm:       #f4f1e9;
  --surface:       #f0eee6;
  --paper:         #ffffff;
  /* ink & text */
  --ink:           #141413;
  --fg:            #26261f;
  --fg-muted:      #56554e;
  --fg-faint:      #87867f;
  /* accent (clay / terracotta) */
  --accent:        #d97757;
  --accent-strong: #bf5d3c;
  --accent-soft:   #f7e9e2;
  --accent-line:   #e6c2b2;
  /* semantics */
  --olive:         #6f8455;
  --olive-soft:    #eaeede;
  --olive-line:    #cdd8bd;
  --gold:          #9a7b32;
  --gold-soft:     #f7f1e3;
  --gold-line:     #e0d3ae;
  --slate:         #5f7fa8;
  --slate-soft:    #eef2f7;
  --slate-line:    #c6d2e0;
  --danger:        #b23b3b;
  --danger-soft:   #f7e6e3;
  /* lines */
  --line:          #e7e3d9;
  --line-strong:   #d4d1c6;
  /* type */
  --serif: 'Instrument Serif', Georgia, 'Times New Roman', serif;
  --sans:  'Inter', -apple-system, BlinkMacSystemFont, system-ui, 'Segoe UI', Roboto, sans-serif;
  --mono:  'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --shadow-card: 0 1px 2px rgba(20,20,19,.04), 0 14px 36px rgba(20,20,19,.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--fg);
  font-family: var(--sans); font-size: 15.5px; line-height: 1.6;
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
img, svg { display: block; max-width: 100%; }
a { color: inherit; }
::selection { background: var(--accent-soft); color: var(--accent-strong); }
.serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.015em; }
.mono  { font-family: var(--mono); }
.sl    { color: var(--accent); }

/* ---------- top nav ---------- */
.topnav {
  position: sticky; top: 0; z-index: 60;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  min-height: 54px; padding: 8px 22px;
  background: rgba(250,249,245,.94);
  backdrop-filter: saturate(140%) blur(12px);
  -webkit-backdrop-filter: saturate(140%) blur(12px);
  border-bottom: 1px solid var(--line);
}
.topnav .brand { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
.topnav .brand .name { font-family: var(--serif); font-size: 21px; letter-spacing: .2px; color: var(--ink); white-space: nowrap; }
.topnav .brand .sub  { font-family: var(--mono); font-size: 11px; color: var(--fg-faint); white-space: nowrap; }
.topnav .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 3px; }
.topnav .tab {
  font-family: var(--sans); font-size: 13px; font-weight: 600;
  border: none; background: none; color: var(--fg-muted);
  padding: 7px 15px; border-radius: 8px; cursor: pointer;
}
.topnav .tab:hover { color: var(--fg); }
.topnav .tab.active { background: var(--paper); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.06); }
.topnav .spacer { flex: 1; }
.topnav .controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.topnav .progress { display: flex; align-items: center; gap: 10px; font-size: 12.5px; color: var(--fg-muted); white-space: nowrap; }
.topnav .bar { width: 130px; height: 7px; border-radius: 99px; background: var(--surface); overflow: hidden; border: 1px solid var(--line); }
.topnav .bar > i { display: block; height: 100%; width: 0; background: var(--olive); transition: width .3s var(--ease); }
@media (max-width: 1080px) { .topnav .bar { display: none; } }
@media (max-width: 880px)  { .topnav .brand .sub { display: none; } }

/* ---------- buttons / toggles ---------- */
.btn {
  font-family: var(--sans); font-size: 12.5px; font-weight: 600;
  border: 1px solid var(--line-strong); background: var(--paper); color: var(--fg);
  padding: 7px 13px; border-radius: 8px; cursor: pointer; transition: .15s ease;
}
.btn:hover { border-color: var(--accent-line); background: var(--accent-soft); }
.btn-primary { background: var(--ink); color: #fff; border-color: var(--ink); }
.btn-primary:hover { background: #000; color: #fff; }
.toggle {
  display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
  font-weight: 600; font-size: 13px; padding: 8px 13px;
  border: 1px solid var(--line-strong); border-radius: 8px;
  background: var(--paper); color: var(--fg); font-family: var(--sans); transition: .15s ease;
}
.toggle:hover { border-color: var(--olive); }
.toggle.on { background: var(--olive-soft); border-color: var(--olive); color: var(--olive); }
.toggle.sm { font-size: 12px; padding: 6px 11px; }
.notefield {
  width: 100%; resize: vertical; min-height: 34px; max-height: 150px;
  padding: 7px 10px; border: 1px solid var(--line-strong); border-radius: 8px;
  font-family: var(--sans); font-size: 12.5px; line-height: 1.45;
  background: var(--paper); color: var(--fg);
}
.notefield:focus { outline: none; border-color: var(--accent-line); box-shadow: 0 0 0 3px rgba(217,119,87,.10); }

/* ---------- badges, chips, pills ---------- */
.type-badge, .status-chip, .lane-tag, .kind-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10.5px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 99px; border: 1px solid var(--line-strong);
  color: var(--fg-muted); background: var(--surface); white-space: nowrap;
}
.ty-doc { color: var(--accent-strong); background: var(--accent-soft); border-color: var(--accent-line); }
.ty-wf  { color: var(--gold);         background: var(--gold-soft);   border-color: var(--gold-line); }
.ty-int { color: var(--slate);        background: var(--slate-soft);  border-color: var(--slate-line); }
.st-planned  { color: var(--fg-muted); }
.st-building { color: var(--gold);  background: var(--gold-soft);  border-color: var(--gold-line); }
.st-built    { color: var(--slate); background: var(--slate-soft); border-color: var(--slate-line); }
.st-verified { color: var(--olive); background: var(--olive-soft); border-color: var(--olive-line); }
.st-approved { color: var(--bg);    background: var(--olive);      border-color: var(--olive); }
.st-deployed { color: var(--bg);    background: var(--ink);        border-color: var(--ink); }
.st-cut      { color: var(--danger); background: var(--danger-soft); border-color: #e3c1ba; text-decoration: line-through; }
.lane-tag { font-family: var(--mono); text-transform: none; letter-spacing: .03em; }
.pill {
  font-family: var(--mono); font-size: 11.5px; color: var(--fg-muted);
  background: var(--surface); border: 1px solid var(--line-strong);
  border-radius: 6px; padding: 2px 8px; white-space: nowrap;
  max-width: 100%; overflow: hidden; text-overflow: ellipsis;
}
.badge {
  font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px;
  border: 1px solid var(--line-strong); color: var(--fg-muted); background: var(--bg);
  display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
}
.score { font-family: var(--mono); font-size: 11px; padding: 3px 8px; border-radius: 6px; background: var(--surface); color: var(--fg-muted); border: 1px solid var(--line); white-space: nowrap; }
.score b { color: var(--fg); font-weight: 600; }
.score.faint { color: var(--fg-faint); font-style: italic; }
.verdict-pass   { color: var(--olive); }
.verdict-revise { color: var(--accent-strong); }
.verdict-fail   { color: var(--danger); }

/* ---------- page scaffold ---------- */
.wrap { max-width: 1180px; margin: 0 auto; padding: 34px 28px 140px; }
.eyebrow {
  display: inline-flex; align-items: center; gap: 9px;
  font-size: 11.5px; font-weight: 600; letter-spacing: .16em;
  text-transform: uppercase; color: var(--fg-faint);
}
.eyebrow.accent { color: var(--accent); }
.eyebrow::before { content: ""; width: 22px; height: 1.5px; background: currentColor; opacity: .55; }
.pagehead { margin-bottom: 8px; }
.pagehead h1 { font-family: var(--serif); font-weight: 400; font-size: clamp(30px, 4vw, 42px); line-height: 1.08; letter-spacing: -0.018em; margin-top: 10px; }
.pagehead h1 em { font-style: italic; color: var(--accent); }
.pagehead .lede { color: var(--fg-muted); font-size: 15px; margin-top: 10px; max-width: 72ch; }
.sec { margin: 34px 0 12px; padding-top: 26px; border-top: 1px solid var(--line); }
.sec:first-of-type { border-top: 0; padding-top: 0; }
.sec h2 { font-family: var(--serif); font-weight: 400; font-size: 26px; letter-spacing: -0.01em; display: flex; align-items: center; gap: 11px; flex-wrap: wrap; }
.sec h2 .ct { font-family: var(--mono); font-size: 13px; color: var(--fg-faint); }
.sec .blurb { color: var(--fg-muted); font-size: 14px; margin-top: 6px; max-width: 78ch; }
.pdot { width: 10px; height: 10px; border-radius: 50%; flex: none; }

/* ---------- open-questions callout (amber) ---------- */
.callout {
  background: #fbf3e7; border: 1px solid #e8d4ad; border-left: 3px solid #c2972f;
  border-radius: 0 10px 10px 0; padding: 14px 18px; margin: 18px 0;
}
.callout .co-h { font-weight: 700; font-size: 12.5px; color: var(--gold); margin-bottom: 7px; letter-spacing: .2px; }
.callout ul { margin: 0; padding-left: 18px; }
.callout li { font-size: 13px; color: var(--fg-muted); margin: 4px 0; }
.callout li .q-skill { font-family: var(--mono); font-size: 12px; color: var(--ink); }
.callout li.resolved { opacity: .55; }
.callout li .res-chip { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--olive); background: var(--olive-soft); border: 1px solid var(--olive-line); border-radius: 99px; padding: 1px 7px; margin-left: 7px; }

/* ---------- plan cards ---------- */
.cardgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 12px; margin-top: 18px; }
.pcard {
  background: var(--paper); border: 1.5px solid var(--line-strong); border-radius: 13px;
  padding: 16px 17px; display: flex; flex-direction: column; gap: 10px;
  transition: transform .3s var(--ease), box-shadow .3s var(--ease), border-color .2s;
}
.pcard:hover { transform: translateY(-2px); box-shadow: var(--shadow-card); border-color: var(--ink); }
.pcard.cut { opacity: .45; }
.pcard.cut .pc-title { text-decoration: line-through; text-decoration-color: var(--accent); }
.pcard.approved { border-color: var(--olive); }
.pc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.pc-title { font-size: 15px; font-weight: 600; color: var(--ink); line-height: 1.3; }
.pc-slug { font-family: var(--mono); font-size: 12px; color: var(--fg-muted); margin-top: 2px; word-break: break-word; }
.pc-sum { font-size: 13px; color: var(--fg-muted); line-height: 1.5; }
.pc-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.pc-rel { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.pc-rel .lbl { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--fg-faint); font-weight: 700; }
.pc-notes { font-size: 12.5px; color: var(--fg-faint); font-style: italic; line-height: 1.45; }
.pc-ctl { display: flex; flex-direction: column; gap: 8px; margin-top: auto; padding-top: 10px; border-top: 1px solid var(--line); }
.mini {
  background: var(--paper); border: 1.5px solid var(--line-strong); border-radius: 12px;
  padding: 14px 16px; display: flex; flex-direction: column; gap: 7px;
}
.mini .m-name { font-family: var(--mono); font-size: 13.5px; color: var(--ink); word-break: break-word; }
.mini .m-sum { font-size: 13px; color: var(--fg-muted); line-height: 1.5; }
.mini .m-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; padding-top: 4px; }

/* ---------- skills tab ---------- */
.layout { display: grid; grid-template-columns: 290px minmax(0, 1fr); min-height: calc(100vh - 55px); }
.side { border-right: 1px solid var(--line); padding: 10px 10px 80px; background: var(--bg-warm); }
.side .search {
  width: calc(100% - 8px); margin: 6px 4px 12px; padding: 8px 11px;
  border: 1px solid var(--line-strong); border-radius: 8px;
  font-family: var(--sans); font-size: 13px; background: var(--paper); color: var(--fg);
}
.side .search:focus { outline: none; border-color: var(--accent-line); }
.phase-h { font-family: var(--mono); font-size: 10.5px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--fg-faint); padding: 14px 8px 6px; display: flex; align-items: center; gap: 7px; }
.phase-h .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
.phase-h .ct { margin-left: auto; font-size: 10px; }
.sk-item { display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: 8px; cursor: pointer; color: var(--fg); border: 1px solid transparent; }
.sk-item:hover { background: var(--surface); }
.sk-item.active { background: var(--paper); border-color: var(--accent-line); box-shadow: 0 1px 0 rgba(0,0,0,.02); }
.sk-item.unbuilt { opacity: .45; cursor: default; }
.sk-item .nm { font-family: var(--mono); font-size: 12px; word-break: break-word; min-width: 0; }
.sk-item .st { margin-left: auto; font-size: 12px; width: 16px; text-align: center; flex: none; }
.skmain { min-width: 0; padding-bottom: 40px; }
.skmain .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; color: var(--fg-faint); text-align: center; gap: 8px; padding: 24px; }
.skmain .empty .big { font-family: var(--serif); font-size: 32px; color: var(--fg-muted); }
.skhead { padding: 26px 36px 18px; border-bottom: 1px solid var(--line); background: var(--paper); }
.skhead .slug { font-family: var(--mono); font-size: 22px; color: var(--ink); word-break: break-word; }
.skhead .desc { color: var(--fg-muted); margin-top: 6px; max-width: 760px; font-size: 14px; }
.skhead .badges { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 13px; align-items: center; }
.filetabs { display: flex; flex-wrap: wrap; gap: 6px; padding: 14px 36px 0; background: var(--paper); }
.ftab {
  font-family: var(--mono); font-size: 11.5px; padding: 6px 11px;
  border-radius: 8px 8px 0 0; border: 1px solid var(--line); border-bottom: none;
  background: var(--bg-warm); color: var(--fg-muted); cursor: pointer;
}
.ftab:hover { color: var(--fg); }
.ftab.active { background: var(--paper); color: var(--ink); border-color: var(--line-strong); font-weight: 600; }
.skmain .oq-wrap { padding: 0 36px; }
.doc { padding: 26px 36px 40px; border-top: 1px solid var(--line); max-width: 940px; }
.doc.full { max-width: 1120px; }
.code-raw { background: #1b1b18; color: #e9e6dc; padding: 16px 18px; border-radius: 10px; overflow-x: auto; font-family: var(--mono); font-size: 12.5px; white-space: pre; line-height: 1.55; }
.rail {
  position: sticky; bottom: 0; background: rgba(255,255,255,.95);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border-top: 1px solid var(--line); padding: 14px 36px;
  display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap;
}
.rail .ap { display: flex; flex-direction: column; gap: 7px; min-width: 140px; }
.rail .ap label { font-size: 10px; color: var(--fg-faint); font-family: var(--mono); text-transform: uppercase; letter-spacing: .8px; }
.rail .grow { flex: 1; min-width: 220px; }
.rail textarea { min-height: 54px; }

/* ---------- markdown ---------- */
.md { line-height: 1.65; font-size: 14px; }
.md h1 { font-family: var(--serif); font-weight: 400; font-size: 29px; margin: .4em 0 .3em; line-height: 1.15; }
.md h2 { font-family: var(--serif); font-weight: 400; font-size: 22px; margin: 1.3em 0 .4em; padding-bottom: .2em; border-bottom: 1px solid var(--line); }
.md h3 { font-size: 15.5px; font-weight: 700; margin: 1.3em 0 .3em; color: var(--ink); }
.md h4, .md h5, .md h6 { font-size: 13px; font-weight: 700; margin: 1.1em 0 .2em; color: var(--fg-muted); text-transform: uppercase; letter-spacing: .5px; }
.md p { margin: .6em 0; }
.md ul, .md ol { margin: .5em 0; padding-left: 1.5em; }
.md li { margin: .22em 0; }
.md code { font-family: var(--mono); font-size: 12.5px; background: var(--surface); padding: 1.5px 5px; border-radius: 5px; color: var(--accent-strong); overflow-wrap: anywhere; }
.md pre { background: #1b1b18; color: #e9e6dc; padding: 14px 16px; border-radius: 10px; overflow-x: auto; margin: .8em 0; border: 1px solid #2a2a26; }
.md pre code { background: none; color: inherit; padding: 0; font-size: 12.5px; }
.md blockquote { border-left: 3px solid var(--accent-line); margin: .7em 0; padding: .3em 0 .3em 16px; color: var(--fg-muted); background: var(--accent-soft); border-radius: 0 8px 8px 0; }
.md table { border-collapse: collapse; margin: .9em 0; font-size: 13px; width: 100%; display: block; overflow-x: auto; }
.md th, .md td { border: 1px solid var(--line-strong); padding: 7px 11px; text-align: left; vertical-align: top; }
.md th { background: var(--bg-warm); font-weight: 700; font-family: var(--mono); font-size: 11.5px; letter-spacing: .3px; }
.md tr:nth-child(even) td { background: var(--bg-warm); }
.md hr { border: none; border-top: 1px solid var(--line); margin: 1.4em 0; }
.md a { text-decoration: underline; text-underline-offset: 2px; }
.md strong { color: var(--ink); }
.md .fm {
  background: var(--bg-warm); border: 1px solid var(--line); border-left: 3px solid var(--accent-line);
  border-radius: 0 8px 8px 0; padding: 11px 15px; font-family: var(--mono); font-size: 11.5px;
  color: var(--fg-muted); white-space: pre-wrap; overflow-wrap: anywhere; line-height: 1.5; margin: 0 0 18px;
}
.md .fm .fm-h { font-size: 9.5px; letter-spacing: 1px; text-transform: uppercase; color: var(--fg-faint); margin-bottom: 6px; }

/* ---------- evals ---------- */
.statgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-top: 18px; }
.stat-card { background: var(--paper); border: 1.5px solid var(--line-strong); border-radius: 13px; padding: 18px; }
.stat-card .v { font-family: var(--serif); font-size: 36px; line-height: 1; color: var(--ink); }
.stat-card .v em { font-style: italic; color: var(--accent); font-size: 20px; }
.stat-card .k { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--fg-faint); font-weight: 700; margin-top: 8px; }
.output-line { margin-top: 14px; font-size: 13.5px; color: var(--fg-muted); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.tblwrap { overflow-x: auto; margin-top: 18px; border: 1.5px solid var(--line-strong); border-radius: 12px; background: var(--paper); }
table.data { border-collapse: collapse; width: 100%; font-size: 13px; min-width: 560px; }
table.data th, table.data td { padding: 9px 14px; text-align: left; border-bottom: 1px solid var(--line); vertical-align: top; }
table.data th { background: var(--bg-warm); font-family: var(--mono); font-size: 11px; letter-spacing: .4px; text-transform: uppercase; color: var(--fg-muted); }
table.data tr:last-child td { border-bottom: none; }
table.data td.n { font-family: var(--mono); text-align: right; }
table.data td.n.bad  { color: var(--danger); font-weight: 600; }
table.data td.n.good { color: var(--olive); }
table.data .slugcell { font-family: var(--mono); font-size: 12.5px; color: var(--ink); }
table.data details summary { cursor: pointer; color: var(--accent-strong); font-size: 12.5px; font-weight: 600; list-style: none; }
table.data details summary::before { content: "▸ "; }
table.data details[open] summary::before { content: "▾ "; }
table.data details ul { margin: 6px 0 0; padding-left: 16px; }
table.data details li { font-size: 12.5px; color: var(--fg-muted); margin: 3px 0; font-style: italic; }
.miss { background: var(--paper); border: 1.5px solid var(--line-strong); border-radius: 12px; padding: 13px 16px; }
.miss .m-q { font-size: 13.5px; color: var(--ink); font-style: italic; }
.miss .m-r { font-size: 12.5px; color: var(--fg-muted); margin-top: 5px; }
.miss .m-s { font-family: var(--mono); font-size: 11.5px; color: var(--accent-strong); margin-bottom: 4px; }
.report-box { background: var(--paper); border: 1.5px solid var(--line-strong); border-radius: 14px; padding: 24px 28px; margin-top: 18px; max-width: 940px; }

/* ---------- deploy ---------- */
.dep-check { display: flex; flex-direction: column; gap: 8px; margin-top: 18px; max-width: 720px; }
.dc-item { display: flex; align-items: flex-start; gap: 12px; background: var(--paper); border: 1.5px solid var(--line-strong); border-radius: 11px; padding: 12px 15px; font-size: 14px; }

<script>

function planNote(slug) { return T(S.plan.notes[slug]); }

/* ================= minimal markdown renderer ================= */
function inline(s) {

    .replace(/`([^`]+)`/g, function (m, c) { return '<code>' + c + '</code>'; })

function md(src) {

      var cells = function (r) { return r.trim().replace(/^\||\|$/g, '').split('|').map(function (c) { return c.trim(); }); };
      var head = cells(rows[0]); var body = rows.slice(2).map(cells);
      var t = '<table><thead><tr>' + head.map(function (h) { return '<th>' + inline(h) + '</th>'; }).join('') + '</tr></thead><tbody>';

  if (i < 0) { i = 0; for (var k = 0; k < lane.length; k++) i = (i + lane.charCodeAt(k)) % LANE_PAL.length; }

  var items = list.map(function (q) {

/* ================= Skills tab ================= */

      var items = catSkills.filter(function (s) { return T(s.phase) === p; }).map(function (s) {

    b.onclick = function () { setTab(b.dataset.tab); };
  });
  $('#controls').style.display = 'flex';
  if (builtSkills && builtSlugs.length && !S.skills.active) S.skills.active = flatBuiltOrder()[0] || null;
  var initial = location.hash.replace('#', '');
  if (!tabOn(initial)) initial = tabOn(S.tab) ? S.tab : TABS[0].id;
  setTab(initial);
  window.addEventListener('hashchange', function () {
    var id = location.hash.replace('#', '');
    if (tabOn(id) && id !== current) setTab(id, false);
  });
}
})();
</script>
