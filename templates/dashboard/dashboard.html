:root {
  /* ground & surface */
  --bg:            #faf9f5;
  --bg-panel:      #f5f4ee;
  --fill:          #f0eee6;
  --active:        #eae7dc;
  --surface:       #ffffff;
  /* ink & text */
  --ink:           #141413;
  --fg:            #3d3d3a;
  --muted:         #5e5d59;
  --faint:         #87867f;
  /* accent (book cloth) */
  --accent:        #d97757;
  --accent-strong: #bf5d3c;
  --accent-soft:   #f7e9e2;
  --accent-line:   #e6c2b2;
  /* semantics */
  --ok:            #6f8455;
  --ok-soft:       #eaeede;
  --ok-line:       #cdd8bd;
  --warn:          #9a7b32;
  --warn-soft:     #f7f1e3;
  --warn-line:     #e0d3ae;
  --info:          #5f7fa8;
  --info-soft:     #eef2f7;
  --info-line:     #c6d2e0;
  --danger:        #b23b3b;
  --danger-soft:   #f7e6e3;
  --danger-line:   #e3c1ba;
  /* lines */
  --line:          #e8e6dc;
  --line-strong:   #d9d7cc;
  /* type */
  --sans:  "anthropicSans", -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", Roboto, sans-serif;
  --serif: "anthropicSerif", "Iowan Old Style", Georgia, "Times New Roman", serif;
  --mono:  "anthropicMono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--fg);
  font-family: var(--sans); font-size: 14.5px; line-height: 1.55;
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
}
img, svg { display: block; max-width: 100%; }
a { color: inherit; }
::selection { background: var(--accent-soft); color: var(--accent-strong); }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
.mono { font-family: var(--mono); }
.sl   { color: var(--accent); }

/* ---------- shell ---------- */
.shell { display: flex; min-height: 100vh; }
.sidebar {
  width: 248px; flex: none;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
  background: var(--bg-panel); border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
}
.sb-brand { padding: 20px 18px 14px; }
.sb-brand .sb-name { font-size: 15px; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; overflow-wrap: anywhere; }
.sb-brand .sb-sub  { font-size: 12px; color: var(--faint); margin-top: 3px; overflow-wrap: anywhere; }
.sb-nav { flex: 1; padding: 4px 10px 16px; }
.sb-group {
  font-size: 10.5px; font-weight: 600; letter-spacing: .09em; text-transform: uppercase;
  color: var(--faint); padding: 16px 8px 5px;
}
.sb-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 10px; border-radius: 7px; cursor: pointer;
  font-size: 13.5px; color: var(--fg); border: none; background: none;
  width: 100%; text-align: left; font-family: var(--sans);
}
.sb-item:hover { background: var(--fill); color: var(--ink); }
.sb-item.active { background: var(--active); color: var(--ink); font-weight: 600; }
.sb-item.disabled { color: var(--faint); cursor: default; }
.sb-item.disabled:hover { background: none; color: var(--faint); }
.sb-item .st { width: 15px; flex: none; text-align: center; font-size: 11px; color: var(--faint); }
.sb-item .st.done { color: var(--ok); }
.sb-item .st.cur  { color: var(--accent); }
.sb-item .hint { margin-left: auto; font-family: var(--mono); font-size: 10.5px; color: var(--faint); white-space: nowrap; }
.sb-foot { padding: 14px 18px; border-top: 1px solid var(--line); font-size: 11px; color: var(--faint); line-height: 1.6; }

.main { flex: 1; min-width: 0; }
.page { max-width: 920px; margin: 0 auto; padding: 38px 44px 120px; }
.page.wide { max-width: 1220px; padding: 38px 36px 120px; }

/* ---------- page header ---------- */
.pagehead { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; flex-wrap: wrap; }
.pagehead h1 { font-family: var(--serif); font-weight: 480; font-size: 28px; line-height: 1.2; letter-spacing: -0.01em; color: var(--ink); }
.pagehead .desc { font-size: 14px; color: var(--muted); margin-top: 7px; max-width: 74ch; }
.pagehead .actions { display: flex; gap: 8px; flex: none; padding-top: 6px; }

/* ---------- sections ---------- */
.sec { margin-top: 36px; padding-top: 22px; border-top: 1px solid var(--line); }
.sec h2 { font-size: 15px; font-weight: 600; color: var(--ink); display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap; }
.sec h2 .ct { font-family: var(--mono); font-size: 12px; font-weight: 400; color: var(--faint); }
.sec .blurb { color: var(--muted); font-size: 13.5px; margin-top: 5px; max-width: 78ch; }
.pdot { width: 8px; height: 8px; border-radius: 50%; flex: none; align-self: center; }

/* ---------- buttons & inputs ---------- */
.btn {
  font-family: var(--sans); font-size: 12.5px; font-weight: 550;
  border: 1px solid var(--line-strong); background: var(--surface); color: var(--fg);
  padding: 7px 13px; border-radius: 8px; cursor: pointer;
}
.btn:hover { border-color: var(--faint); color: var(--ink); }
.btn-primary { background: var(--ink); color: #fff; border-color: var(--ink); }
.btn-primary:hover { background: #000; color: #fff; }
.toggle {
  display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
  font-weight: 550; font-size: 12.5px; padding: 7px 12px;
  border: 1px solid var(--line-strong); border-radius: 8px;
  background: var(--surface); color: var(--fg); font-family: var(--sans);
}
.toggle:hover { border-color: var(--ok); }
.toggle.on { background: var(--ok-soft); border-color: var(--ok); color: var(--ok); }
.notefield {
  width: 100%; resize: vertical; min-height: 34px; max-height: 150px;
  padding: 7px 10px; border: 1px solid var(--line-strong); border-radius: 8px;
  font-family: var(--sans); font-size: 12.5px; line-height: 1.45;
  background: var(--surface); color: var(--fg);
}
.notefield:focus { outline: none; border-color: var(--accent-line); box-shadow: 0 0 0 3px rgba(217,119,87,.10); }
.search {
  width: 100%; padding: 8px 11px; margin-bottom: 10px;
  border: 1px solid var(--line-strong); border-radius: 8px;
  font-family: var(--sans); font-size: 13px; background: var(--surface); color: var(--fg);
}
.search:focus { outline: none; border-color: var(--accent-line); }

/* ---------- review bar (Plan / Skills / Evals) ---------- */
.reviewbar {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  border: 1px solid var(--line); border-radius: 10px; background: var(--surface);
  padding: 10px 14px; margin-top: 20px;
}
.reviewbar .rb-text { font-size: 12.5px; color: var(--muted); white-space: nowrap; }
.reviewbar .rb-text b { color: var(--ink); font-weight: 600; }
.reviewbar .rb-bar { flex: 1; min-width: 120px; height: 6px; border-radius: 99px; background: var(--fill); overflow: hidden; border: 1px solid var(--line); }
.reviewbar .rb-bar > i { display: block; height: 100%; width: 0; background: var(--ok); }
.reviewbar .rb-hint { font-size: 12px; color: var(--faint); flex-basis: 100%; }

/* ---------- badges, chips, pills ---------- */
.type-badge, .status-chip, .lane-tag, .kind-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10.5px; font-weight: 550; letter-spacing: .04em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 99px; border: 1px solid var(--line-strong);
  color: var(--muted); background: var(--bg-panel); white-space: nowrap;
}
.ty-doc { color: var(--accent-strong); background: var(--accent-soft); border-color: var(--accent-line); }
.ty-wf  { color: var(--warn); background: var(--warn-soft); border-color: var(--warn-line); }
.ty-int { color: var(--info); background: var(--info-soft); border-color: var(--info-line); }
.st-planned  { color: var(--muted); }
.st-building { color: var(--warn); background: var(--warn-soft); border-color: var(--warn-line); }
.st-built    { color: var(--info); background: var(--info-soft); border-color: var(--info-line); }
.st-verified { color: var(--ok); background: var(--ok-soft); border-color: var(--ok-line); }
.st-approved { color: var(--bg); background: var(--ok); border-color: var(--ok); }
.st-deployed { color: var(--bg); background: var(--ink); border-color: var(--ink); }
.st-cut      { color: var(--danger); background: var(--danger-soft); border-color: var(--danger-line); text-decoration: line-through; }
.lane-tag { font-family: var(--mono); text-transform: none; letter-spacing: .02em; }
.pill {
  font-family: var(--mono); font-size: 11.5px; color: var(--muted);
  background: var(--fill); border: 1px solid var(--line-strong);
  border-radius: 6px; padding: 2px 8px; white-space: nowrap;
  max-width: 100%; overflow: hidden; text-overflow: ellipsis;
}
.badge {
  font-size: 11px; font-weight: 550; padding: 3px 9px; border-radius: 99px;
  border: 1px solid var(--line-strong); color: var(--muted); background: var(--bg);
  display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
}
.score { font-family: var(--mono); font-size: 11px; padding: 3px 8px; border-radius: 6px; background: var(--fill); color: var(--muted); border: 1px solid var(--line); white-space: nowrap; }
.score b { color: var(--ink); font-weight: 600; }
.score.faint { color: var(--faint); font-style: italic; }
.verdict-pass   { color: var(--ok); }
.verdict-revise { color: var(--accent-strong); }
.verdict-fail   { color: var(--danger); }
.vbadge {
  font-family: var(--mono); font-size: 10px; letter-spacing: .07em; text-transform: uppercase;
  border-radius: 99px; padding: 3px 9px; white-space: nowrap; border: 1px solid var(--line-strong);
  color: var(--muted); background: var(--bg-panel);
}
.vbadge.pass  { background: var(--ok-soft); border-color: var(--ok-line); color: var(--ok); }
.vbadge.fail  { background: var(--danger-soft); border-color: var(--danger-line); color: var(--danger); }
.vbadge.gated { background: var(--warn-soft); border-color: var(--warn-line); color: var(--warn); }
.vbadge.info  { background: var(--info-soft); border-color: var(--info-line); color: var(--info); }

/* ---------- Overview ---------- */
.cmdrow {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  background: var(--ink); color: #f0efea; border-radius: 10px;
  padding: 14px 18px; margin-top: 22px;
}
.cmdrow .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: .13em; text-transform: uppercase; color: #9a988d; white-space: nowrap; }
.cmdrow code { font-family: var(--mono); font-size: 15px; color: #fff; white-space: nowrap; }
.cmdrow code.long { white-space: normal; overflow-wrap: anywhere; flex: 1; min-width: 220px; font-size: 13px; }
.cmdrow .why { font-size: 12.5px; color: #b8b5a8; flex: 1; min-width: 220px; line-height: 1.5; }
.cmdrow .copy {
  font-family: var(--sans); font-size: 11.5px; font-weight: 550; cursor: pointer;
  border: 1px solid #56554e; border-radius: 8px; padding: 6px 12px;
  color: #e8e6df; background: none; white-space: nowrap;
}
.cmdrow .copy:hover { border-color: #87867f; }

.attn { border: 1px solid var(--line); border-radius: 10px; background: var(--surface); margin-top: 16px; overflow: hidden; }
.attn .a { display: flex; align-items: baseline; gap: 10px; padding: 10px 14px; font-size: 13px; color: var(--muted); border-top: 1px solid var(--line); }
.attn .a:first-child { border-top: none; }
.attn .a b { color: var(--ink); font-weight: 600; }
.attn .a .mk { flex: none; font-size: 11px; color: var(--faint); width: 14px; text-align: center; }
.attn .a.hot { background: var(--accent-soft); color: var(--accent-strong); }
.attn .a.hot .mk { color: var(--accent-strong); }
.attn .a.hot b { color: var(--accent-strong); }

.spine { border: 1px solid var(--line); border-radius: 10px; background: var(--surface); margin-top: 16px; overflow: hidden; }
.ph-step { border-top: 1px solid var(--line); }
.ph-step:first-child { border-top: none; }
.ph-step summary {
  list-style: none; cursor: pointer; display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; font-size: 13.5px;
}
.ph-step summary::-webkit-details-marker { display: none; }
.ph-step summary:hover { background: var(--bg); }
.ph-step .ic {
  width: 20px; height: 20px; border-radius: 50%; flex: none;
  display: grid; place-items: center; font-size: 10px;
  border: 1.5px solid var(--line-strong); color: var(--faint); background: var(--bg-panel);
}
.ph-step.done .ic { background: var(--ok-soft); border-color: var(--ok); color: var(--ok); }
.ph-step.cur .ic { background: var(--accent); border-color: var(--accent); color: #fff; }
.ph-step .nm { font-weight: 600; color: var(--ink); white-space: nowrap; }
.ph-step.pending .nm { color: var(--muted); font-weight: 500; }
.ph-step .cmd { font-family: var(--mono); font-size: 11.5px; color: var(--faint); white-space: nowrap; }
.ph-step .stat { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--faint); text-align: right; }
.ph-step.cur .stat { color: var(--accent-strong); }
.ph-step .lesson {
  border-top: 1px solid var(--line); background: var(--bg-panel);
  padding: 13px 16px 15px 46px; font-size: 13px; color: var(--muted);
  display: flex; flex-direction: column; gap: 7px;
}
.ph-step .lesson b { color: var(--ink); font-weight: 600; }
.ph-step .lesson .l-row { display: flex; gap: 10px; }
.ph-step .lesson .l-k { flex: none; width: 92px; font-family: var(--mono); font-size: 9.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--faint); padding-top: 3px; }
.guide-hint { margin-top: 14px; font-size: 12.5px; color: var(--faint); }

/* what's-in / references lists */
.reflist { border: 1px solid var(--line); border-radius: 10px; background: var(--surface); margin-top: 16px; overflow: hidden; }
.reflist .r { display: flex; align-items: baseline; gap: 12px; padding: 10px 14px; border-top: 1px solid var(--line); font-size: 13px; }
.reflist .r:first-child { border-top: none; }
.reflist .r .k { flex: none; width: 152px; font-family: var(--mono); font-size: 12px; color: var(--ink); overflow-wrap: anywhere; }
.reflist .r .d { color: var(--muted); min-width: 0; }
.reflist .r .g { margin-left: auto; flex: none; }
.reflist a.r:hover { background: var(--bg); }
.reflist a.r .k { color: var(--accent-strong); }
.reflist a { text-decoration: none; }
.reflist .arrow { margin-left: auto; color: var(--faint); flex: none; font-size: 12px; }

/* ---------- callout (open questions) ---------- */
.callout {
  background: var(--warn-soft); border: 1px solid var(--warn-line);
  border-radius: 10px; padding: 13px 16px; margin: 18px 0 0;
}
.callout .co-h { font-weight: 600; font-size: 12.5px; color: var(--warn); margin-bottom: 6px; }
.callout ul { margin: 0; padding-left: 18px; }
.callout li { font-size: 13px; color: var(--muted); margin: 4px 0; }
.callout li .q-skill { font-family: var(--mono); font-size: 12px; color: var(--ink); }
.callout li.resolved { opacity: .55; }
.callout li .res-chip { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--ok); background: var(--ok-soft); border: 1px solid var(--ok-line); border-radius: 99px; padding: 1px 7px; margin-left: 7px; }

/* ---------- plan cards ---------- */
.cardgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 10px; margin-top: 16px; }
.pcard {
  background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
  padding: 14px 15px; display: flex; flex-direction: column; gap: 9px;
}
.pcard.cut { opacity: .45; }
.pcard.cut .pc-title { text-decoration: line-through; text-decoration-color: var(--accent); }
.pcard.approved { border-color: var(--ok); box-shadow: inset 0 0 0 1px var(--ok); }
.pc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.pc-title { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.3; }
.pc-slug { font-family: var(--mono); font-size: 11.5px; color: var(--muted); margin-top: 2px; word-break: break-word; }
.pc-sum { font-size: 12.5px; color: var(--muted); line-height: 1.5; }
.pc-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.pc-rel { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.pc-rel .lbl { font-size: 9.5px; letter-spacing: .09em; text-transform: uppercase; color: var(--faint); font-weight: 600; }
.pc-notes { font-size: 12px; color: var(--faint); font-style: italic; line-height: 1.45; }
.pc-ctl { display: flex; flex-direction: column; gap: 8px; margin-top: auto; padding-top: 10px; border-top: 1px solid var(--line); }
.mini {
  background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
  padding: 12px 14px; display: flex; flex-direction: column; gap: 6px;
}
.mini .m-name { font-family: var(--mono); font-size: 13px; color: var(--ink); word-break: break-word; }
.mini .m-sum { font-size: 12.5px; color: var(--muted); line-height: 1.5; }
.mini .m-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; padding-top: 4px; }

/* ---------- skills page ---------- */
.layout { display: grid; grid-template-columns: 236px minmax(0, 1fr); gap: 0; margin-top: 22px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); overflow: hidden; }
.side { border-right: 1px solid var(--line); padding: 14px 10px 40px; background: var(--bg-panel); }
.phase-h { font-size: 10.5px; font-weight: 600; letter-spacing: .09em; text-transform: uppercase; color: var(--faint); padding: 14px 8px 5px; display: flex; align-items: center; gap: 7px; }
.phase-h .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
.phase-h .ct { margin-left: auto; font-family: var(--mono); font-size: 10px; }
.sk-item { display: flex; align-items: center; gap: 8px; padding: 6px 9px; border-radius: 7px; cursor: pointer; color: var(--fg); }
.sk-item:hover { background: var(--fill); }
.sk-item.active { background: var(--active); color: var(--ink); }
.sk-item.active .nm { font-weight: 600; }
.sk-item.unbuilt { opacity: .45; cursor: default; }
.sk-item.unbuilt:hover { background: none; }
.sk-item .nm { font-family: var(--mono); font-size: 12px; word-break: break-word; min-width: 0; }
.sk-item .st { margin-left: auto; font-size: 11px; width: 16px; text-align: center; flex: none; }
.skmain { min-width: 0; padding-bottom: 0; display: flex; flex-direction: column; }
.skmain .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; color: var(--faint); text-align: center; gap: 8px; padding: 24px; }
.skmain .empty .big { font-family: var(--serif); font-size: 26px; color: var(--muted); }
.skhead { padding: 22px 30px 0; }
.skhead .slug { font-family: var(--mono); font-size: 19px; color: var(--ink); word-break: break-word; }
.skhead .desc { color: var(--muted); margin-top: 6px; max-width: 760px; font-size: 13.5px; }
.skhead .badges { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; align-items: center; }
.filetabs { display: flex; flex-wrap: wrap; gap: 0 20px; padding: 14px 30px 0; border-bottom: 1px solid var(--line); }
.ftab {
  font-family: var(--mono); font-size: 11.5px; padding: 7px 1px 9px;
  border: none; border-bottom: 2px solid transparent; margin-bottom: -1px;
  background: none; color: var(--muted); cursor: pointer;
}
.ftab:hover { color: var(--ink); }
.ftab.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 550; }
.skmain .oq-wrap { padding: 0 30px; }
.skmain .oq-wrap .callout { margin-top: 14px; }
.doc { padding: 24px 30px 40px; max-width: 900px; flex: 1; }
.doc.full { max-width: none; }
.code-raw { background: #1b1b18; color: #e9e6dc; padding: 16px 18px; border-radius: 10px; overflow-x: auto; font-family: var(--mono); font-size: 12.5px; white-space: pre; line-height: 1.55; }
.rail {
  position: sticky; bottom: 0; background: rgba(255,255,255,.95);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border-top: 1px solid var(--line); padding: 13px 30px;
  display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap;
}
.rail .ap { display: flex; flex-direction: column; gap: 7px; min-width: 140px; }
.rail .ap label { font-size: 9.5px; color: var(--faint); font-family: var(--mono); text-transform: uppercase; letter-spacing: .08em; }
.rail .grow { flex: 1; min-width: 220px; }
.rail textarea { min-height: 52px; }

/* ---------- markdown ---------- */
.md { line-height: 1.65; font-size: 14px; }
.md h1 { font-family: var(--serif); font-weight: 480; font-size: 25px; margin: .4em 0 .3em; line-height: 1.2; color: var(--ink); }
.md h2 { font-family: var(--serif); font-weight: 480; font-size: 20px; margin: 1.4em 0 .4em; padding-bottom: .25em; border-bottom: 1px solid var(--line); color: var(--ink); }
.md h3 { font-size: 15px; font-weight: 600; margin: 1.3em 0 .3em; color: var(--ink); }
.md h4, .md h5, .md h6 { font-size: 12.5px; font-weight: 600; margin: 1.1em 0 .2em; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.md p { margin: .6em 0; }
.md ul, .md ol { margin: .5em 0; padding-left: 1.5em; }
.md li { margin: .22em 0; }
.md code { font-family: var(--mono); font-size: 12.5px; background: var(--fill); padding: 1.5px 5px; border-radius: 5px; color: var(--ink); border: 1px solid var(--line); overflow-wrap: anywhere; }
.md pre { background: #1b1b18; color: #e9e6dc; padding: 14px 16px; border-radius: 10px; overflow-x: auto; margin: .8em 0; border: 1px solid #2a2a26; }
.md pre code { background: none; color: inherit; padding: 0; border: none; font-size: 12.5px; }
.md blockquote { border-left: 3px solid var(--accent-line); margin: .7em 0; padding: .3em 0 .3em 16px; color: var(--muted); background: var(--accent-soft); border-radius: 0 8px 8px 0; }
.md table { border-collapse: collapse; margin: .9em 0; font-size: 13px; width: 100%; display: block; overflow-x: auto; }
.md th, .md td { border: 1px solid var(--line-strong); padding: 7px 11px; text-align: left; vertical-align: top; }
.md th { background: var(--bg-panel); font-weight: 600; font-size: 12px; }
.md hr { border: none; border-top: 1px solid var(--line); margin: 1.4em 0; }
.md a { color: var(--accent-strong); text-decoration: underline; text-underline-offset: 2px; }
.md strong { color: var(--ink); }
.md .fm {
  background: var(--bg-panel); border: 1px solid var(--line);
  border-radius: 8px; padding: 11px 15px; font-family: var(--mono); font-size: 11.5px;
  color: var(--muted); white-space: pre-wrap; overflow-wrap: anywhere; line-height: 1.5; margin: 0 0 18px;
}
.md .fm .fm-h { font-size: 9.5px; letter-spacing: .09em; text-transform: uppercase; color: var(--faint); margin-bottom: 6px; }

/* ---------- evals ---------- */
.statgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(148px, 1fr)); gap: 10px; margin-top: 16px; }
.stat-card { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; }
.stat-card.hero { border-color: var(--ok-line); background: var(--ok-soft); }
.stat-card .v { font-size: 24px; font-weight: 600; line-height: 1.15; color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
.stat-card.hero .v { color: var(--ok); }
.stat-card .v em { font-style: normal; color: var(--muted); font-size: 14px; font-weight: 500; }
.stat-card .k { font-size: 10.5px; letter-spacing: .07em; text-transform: uppercase; color: var(--faint); font-weight: 600; margin-top: 7px; }
.ledger { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.ledger .lp { font-size: 12px; color: var(--muted); background: var(--surface); border: 1px solid var(--line); border-radius: 99px; padding: 4px 12px; }
.ledger .lp b { color: var(--ink); }

  }
  if (!checklist.length && !steps.length && !T(deploy.siteDir) && !T(deploy.notes)) {
    h += '<div class="callout"><div class="co-h">⚑ Deploy has started but has no detail yet</div><ul><li>Re-run the data generator after <span class="q-skill">/fde-deploy</span> makes progress.</li></ul></div>';
  }
  h += '</div>';
  return h;
}

/* ================= export / reset ================= */
function evalCaseKeys() {
  if (!evals || evals.output == null) return [];
  return A(O(evals.output).cases).filter(function (c) { return c && T(c.skill); })
    .map(function (c) { return T(c.skill) + '#' + T(c.evalId); });
}
function counts() {
  var t = 0, a = 0;
  if (catalog) catSkills.forEach(function (s) { t++; if (S.plan.approved[T(s.slug)]) a++; });
  if (builtSkills) builtSlugs.forEach(function (sl) { t++; if (S.skills.approved[sl]) a++; });
  evalCaseKeys().forEach(function (k) { t++; if (S.evals.approved[k]) a++; });
  return { t: t, a: a };
}
function decisionLine(approved) { return approved ? 'approved' : 'not approved'; }
function buildExport() {
  var L = [];
  L.push('# Plugin review export');
  L.push('');
  L.push('- Team: ' + (T(eng.team) || '(unknown)'));
  L.push('- Plugin: ' + (T(eng.pluginName) || '(unknown)') + (T(eng.version) ? ' v' + T(eng.version) : ''));
  if (D && T(D.generated)) L.push('- Data generated: ' + T(D.generated));
  L.push('- Exported: ' + new Date().toISOString());
  var c = counts();
  L.push('- Approved: ' + c.a + ' / ' + c.t);
  L.push('');
  if (catalog) {
    var pa = catSkills.filter(function (s) { return S.plan.approved[T(s.slug)]; }).length;
    L.push('## Catalog decisions (Plan tab)');
    L.push('');
    L.push('Approved ' + pa + ' / ' + catSkills.length + ' catalog skills.');
    L.push('');
    var placed = {};
    var phaseList = phases.slice();
    phaseList.push(null); // null bucket = unphased
    phaseList.forEach(function (p) {
      var list = catSkills.filter(function (s) {
        return p == null ? !placed[T(s.slug)] : T(s.phase) === p;
      });
      if (p != null) list.forEach(function (s) { placed[T(s.slug)] = true; });
      if (!list.length) return;
      L.push('### Phase: ' + (p == null ? '(unphased)' : p));
      L.push('');
      list.forEach(function (s) {
        var slug = T(s.slug);
        L.push('#### [catalog] ' + slug + ' — ' + decisionLine(!!S.plan.approved[slug]));
        var n = planNote(slug).trim();
        L.push(n ? n : '_(no notes)_');
        L.push('');
      });
    });
  }
  if (builtSkills) {
    var sa = builtSlugs.filter(function (sl) { return S.skills.approved[sl]; }).length;
    L.push('## Built-skill decisions (Skills tab)');
    L.push('');
    L.push('Approved ' + sa + ' / ' + builtSlugs.length + ' built skills.');
    L.push('');
    flatBuiltOrder().forEach(function (slug) {
      L.push('### [skill] ' + slug + ' — ' + decisionLine(!!S.skills.approved[slug]));
      var n = skillNote(slug).trim();
      L.push(n ? n : '_(no notes)_');
      L.push('');
    });
  }
  var ekeys = evalCaseKeys();
  if (ekeys.length) {
    var ea = ekeys.filter(function (k) { return S.evals.approved[k]; }).length;
    L.push('## Eval feedback (Evals tab)');
    L.push('');
    L.push('Approved ' + ea + ' / ' + ekeys.length + ' output-eval cases.');
    L.push('');
    ekeys.forEach(function (k) {
      L.push('### [eval] ' + k + ' — ' + decisionLine(!!S.evals.approved[k]));
      var n = evalNote(k).trim();
      L.push(n ? n : '_(no notes)_');
      L.push('');
    });
  }
  var changes = [];
  catSkills.forEach(function (s) { var sl = T(s.slug); if (planNote(sl).trim() && changes.indexOf(sl) < 0) changes.push(sl); });
  builtSlugs.forEach(function (sl) { if (skillNote(sl).trim() && changes.indexOf(sl) < 0) changes.push(sl); });
  ekeys.forEach(function (k) {
    var sl = k.split('#')[0];
    if (evalNote(k).trim() && changes.indexOf(sl) < 0) changes.push(sl);
  });
  L.push('---');
  L.push('');
  L.push('**Items with change requests:** ' + (changes.length ? changes.map(function (s) { return '/' + s; }).join(', ') : 'none'));
  L.push('');
  return L.join('\n');
}

/* ================= sidebar nav & routing ================= */
var appEl = $('#app');
var current = null;
/* Sidebar rows: Overview always; the five phase pages always listed so the
   lifecycle is visible, but only clickable once their data exists. */
var NAV = [
  { id: 'home', label: 'Overview' },
  { group: 'Engagement' },
  { id: 'plan', label: 'Plan', spine: 'plan', after: '/fde-plan' },
  { id: 'skills', label: 'Skills', spine: 'build', after: '/fde-build' },
  { id: 'test', label: 'Test', spine: 'test', after: '/fde-test' },
  { id: 'evals', label: 'Evals', spine: 'eval', after: '/fde-eval' },
  { id: 'deploy', label: 'Deploy', spine: 'deploy', after: '/fde-deploy' }
];
function navHint(id) {
  if (id === 'plan' && catalog) return catSkills.length + ' skills';
  if (id === 'skills' && builtSkills) return builtSlugs.length + ' built';
  if (id === 'test' && test) {
    var cov = A(test.coverage).filter(function (r) { return r && T(r.slug); });
    if (cov.length) {
      var tested = cov.filter(function (r) { return T(r.verdict) && T(r.verdict) !== 'untested'; }).length;
      return tested + '/' + cov.length;
    }
  }
  if (id === 'evals' && evals) {
    var hold = O(O(evals.trigger).holdout);
    if (num(hold.accuracy) != null) return pct(hold.accuracy);
  }
  if (id === 'deploy' && deploy) {
    var cl = A(deploy.checklist).filter(Boolean);
    if (cl.length) return cl.filter(function (c) { return !!c.done; }).length + '/' + cl.length;
  }
  return '';
}
function renderNav() {
  var h = '';
  NAV.forEach(function (n) {
    if (n.group) { h += '<div class="sb-group">' + esc(n.group) + '</div>'; return; }
    var enabled = tabOn(n.id);
    var st = '';
    if (n.spine) {
      var s = spineState(n.spine).state;
      st = s === 'done' ? '<span class="st done">✓</span>' : s === 'current' ? '<span class="st cur">●</span>' : '<span class="st">○</span>';
    } else {
      st = '<span class="st"></span>';
    }
    var hint = enabled ? navHint(n.id) : '';
    h += '<button class="sb-item' + (current === n.id ? ' active' : '') + (enabled ? '' : ' disabled') + '"' +
      (enabled ? ' data-nav="' + n.id + '"' : ' title="Appears after ' + esc(n.after || '') + ' runs"') + '>' +
      st + '<span>' + esc(n.label) + '</span>' +
      (hint ? '<span class="hint">' + esc(hint) + '</span>' : '') + '</button>';
  });
  $('#nav').innerHTML = h;
}
function renderTab() {
  if (current === 'home') appEl.innerHTML = renderHome();
  else if (current === 'plan') appEl.innerHTML = renderPlan();
  else if (current === 'skills') { appEl.innerHTML = renderSkills(); renderSkillNav(); renderSkillMain(); }
  else if (current === 'test') appEl.innerHTML = renderTest();
  else if (current === 'evals') appEl.innerHTML = renderEvals();
  else if (current === 'deploy') appEl.innerHTML = renderDeploy();
}
function setTab(id, pushHash) {
  if (!tabOn(id)) id = TABS[0].id;
  current = id; S.tab = id; save();
  if (pushHash !== false) { try { history.replaceState(null, '', '#' + id); } catch (e) { } }
  renderNav();
  renderTab();
  window.scrollTo(0, 0);
}

/* ================= events (delegated) ================= */
document.querySelector('.sidebar').addEventListener('click', function (e) {
  var el = e.target.closest('[data-nav]');
  if (el) setTab(el.getAttribute('data-nav'));
});
appEl.addEventListener('click', function (e) {
  var el;
  if ((el = e.target.closest('#copyCmd'))) {
    var cmd = $('#nextCmd') ? $('#nextCmd').textContent : '';
    function done() { el.textContent = 'Copied ✓'; setTimeout(function () { el.textContent = 'Copy command'; }, 1400); }
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(cmd).then(done, done);
      else done();
    } catch (err) { done(); }
    return;
  }
  if ((el = e.target.closest('#copyLive'))) {
    var live = $('#liveCmd') ? $('#liveCmd').textContent : '';
    function done2() { el.textContent = 'Copied ✓'; setTimeout(function () { el.textContent = 'Copy command'; }, 1400); }
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(live).then(done2, done2);
      else done2();
    } catch (err2) { done2(); }
    return;
  }
  if ((el = e.target.closest('[data-export]'))) {
    $('#exportMd').value = buildExport();
    $('#modal').classList.add('open');
    return;
  }
  if ((el = e.target.closest('[data-reset]'))) {
    var go = true;
    try { go = confirm('Clear all approvals and notes for this review — every page, not just this one?'); } catch (e2) { }
    if (!go) return;
    var keepTab = S.tab, keepActive = S.skills.active;
    S = freshState(); S.tab = keepTab; S.skills.active = keepActive;
    save(); renderTab();
    return;
  }
  if ((el = e.target.closest('[data-plan-approve]'))) {
    var slug = el.getAttribute('data-plan-approve');
    if (S.plan.approved[slug]) delete S.plan.approved[slug];
    else S.plan.approved[slug] = new Date().toISOString();
    save();
    var on = !!S.plan.approved[slug];
    el.classList.toggle('on', on);
    el.textContent = on ? '✓ Approved' : 'Approve';
    var card = el.closest('.pcard'); if (card) card.classList.toggle('approved', on);
    updateReviewBar();
    return;
  }
  if ((el = e.target.closest('[data-skill-approve]'))) {
    var slug2 = el.getAttribute('data-skill-approve');
    if (S.skills.approved[slug2]) delete S.skills.approved[slug2];
    else S.skills.approved[slug2] = new Date().toISOString();
    save(); renderSkillNav(); renderSkillMain(); updateReviewBar();
    return;
  }
  if ((el = e.target.closest('[data-eval-approve]'))) {
    var key = el.getAttribute('data-eval-approve');
    if (S.evals.approved[key]) delete S.evals.approved[key];
    else S.evals.approved[key] = new Date().toISOString();
    save();
    var on2 = !!S.evals.approved[key];
    el.classList.toggle('on', on2);
    el.textContent = on2 ? '✓ Approved' : 'Approve';
    updateReviewBar();
    return;
  }
  if ((el = e.target.closest('[data-slug-item]'))) {
    S.skills.active = el.getAttribute('data-slug-item');
    save(); renderSkillNav(); renderSkillMain();
    return;
  }
  if ((el = e.target.closest('[data-ftab]'))) {
    var path = decodeURIComponent(el.getAttribute('data-ftab'));
    if (S.skills.active) { S.skills.file[S.skills.active] = path; save(); renderSkillMain(); }
    return;
  }
});
appEl.addEventListener('input', function (e) {
  var t = e.target;
  if (t.matches && t.matches('[data-plan-note]')) {
    var slug = t.getAttribute('data-plan-note');
    var v = t.value;
    if (v.trim()) S.plan.notes[slug] = v; else delete S.plan.notes[slug];
    save();
    return;
  }
  if (t.matches && t.matches('[data-skill-note]')) {
    var slug2 = t.getAttribute('data-skill-note');
    var v2 = t.value;
    if (v2.trim()) S.skills.notes[slug2] = v2; else delete S.skills.notes[slug2];
    save(); renderSkillNav();
    return;
  }
  if (t.matches && t.matches('[data-eval-note]')) {
    var key = t.getAttribute('data-eval-note');
    var v3 = t.value;
    if (v3.trim()) S.evals.notes[key] = v3; else delete S.evals.notes[key];
    save();
    return;
  }
  if (t.id === 'sk-search') renderSkillNav();
});
document.addEventListener('keydown', function (e) {
  if (current !== 'skills') return;
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  var flat = flatBuiltOrder();
  if (!flat.length) return;
  var idx = flat.indexOf(S.skills.active);
  if (e.key === 'ArrowDown' || e.key === 'j') {
    if (idx < flat.length - 1) { S.skills.active = flat[idx + 1]; save(); renderSkillNav(); renderSkillMain(); }
  }
  if (e.key === 'ArrowUp' || e.key === 'k') {
    if (idx > 0) { S.skills.active = flat[idx - 1]; save(); renderSkillNav(); renderSkillMain(); }
  }
});

/* modal */
$('#closeBtn').onclick = function () { $('#modal').classList.remove('open'); };
$('#modal').addEventListener('click', function (e) { if (e.target.id === 'modal') $('#modal').classList.remove('open'); });
$('#copyBtn').onclick = function () {
  var ta = $('#exportMd');
  function done() { $('#copyBtn').textContent = 'Copied ✓'; setTimeout(function () { $('#copyBtn').textContent = 'Copy'; }, 1400); }
  if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(ta.value).then(done, function () { ta.select(); document.execCommand('copy'); done(); });
  else { ta.select(); document.execCommand('copy'); done(); }
};
$('#downloadBtn').onclick = function () {
  var b = new Blob([buildExport()], { type: 'text/markdown' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'review-export-' + (T(eng.pluginName) || 'plugin') + '.md';
  a.click();
  setTimeout(function () { URL.revokeObjectURL(a.href); }, 500);
};

/* ================= init ================= */
$('#brand-name').textContent = T(eng.team) || 'Engagement';
var sub = [];
if (T(eng.pluginName)) sub.push(T(eng.pluginName) + (T(eng.version) ? ' v' + T(eng.version) : ''));
$('#brand-sub').textContent = sub.join(' · ') || 'Engagement dashboard';
var foot = [];
if (D && T(D.generated)) foot.push('data generated ' + T(D.generated).slice(0, 10));
foot.push('Auto-FDE engagement dashboard');
$('#sb-foot').innerHTML = foot.map(esc).join('<br>');
document.title = (T(eng.team) ? T(eng.team) + ' — ' : '') + 'Dashboard';

if (builtSkills && builtSlugs.length && !S.skills.active) S.skills.active = flatBuiltOrder()[0] || null;
var initial = location.hash.replace('#', '');
if (!tabOn(initial)) initial = tabOn(S.tab) ? S.tab : TABS[0].id;
setTab(initial);
window.addEventListener('hashchange', function () {
  var id = location.hash.replace('#', '');
  if (tabOn(id) && id !== current) setTab(id, false);
});
})();
</script>
