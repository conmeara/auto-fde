<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutorials — a Claude Code plugin</title>
  <meta name="description" content="Tutorials for this Claude Code plugin — getting started, installing, your first command, how skills trigger, and getting help.">
  <link rel="stylesheet" href="styles.css">
  <script>
    /* Enable reveal animations only when JS runs; reveal everything as a
       backstop in case app.js never executes — page is never left blank. */
    document.documentElement.className += ' js';
    addEventListener('load', function () {
      setTimeout(function () {
        if (!window.__revealsReady) {
          document.querySelectorAll('.reveal').forEach(function (e) { e.classList.add('in'); });
        }
      }, 1500);
    });
  </script>
</head>
<body data-page="tutorials">

<!-- ============ NAV ============ -->
<nav class="nav">
  <div class="nav-in">
    <a class="brand" href="index.html">
      <span class="name" data-bind="plugin.displayName">Plugin</span>
      <span class="sub">a Claude Code plugin</span>
    </a>
    <button class="nav-toggle" aria-label="Toggle menu">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>
    <div class="nav-links">
      <a href="index.html" data-page="overview">Overview</a>
      <a href="install.html" data-page="install">Install</a>
      <a href="tutorials.html" data-page="tutorials">Tutorials</a>
    </div>
  </div>
</nav>

<main>

  <!-- ============ WIKI ============ -->
  <div class="container">
    <div class="wiki">

      <aside class="wiki-side">
        <input class="wiki-search" id="wiki-search" type="search" placeholder="Search the tutorials…" aria-label="Search the tutorials">
        <nav id="wiki-side-list" aria-label="Tutorials"><!-- rendered by wiki.js from SITE_DATA.wiki --></nav>
      </aside>

      <article class="wiki-article" id="wiki-article">
        <noscript>
          <p style="padding:24px;border:1px solid #e8e6dc;border-radius:12px;background:#f5f4ee">
            The tutorials render from <code>data.js</code> and need JavaScript.
            Meanwhile: the <a href="index.html">overview</a> and
            <a href="install.html">install guide</a> describe the plugin.
          </p>
        </noscript>
      </article>

    </div>
  </div>

</main>

<!-- ============ FOOTER ============ -->
<footer class="footer">
  <div class="container footer-in">
    <a class="brand" href="index.html">
      <span class="name serif" data-bind="plugin.displayName">Plugin</span>
    </a>
    <div class="footer-note">A Claude Code plugin</div>
  </div>
</footer>

<script src="data.js"></script>
<script src="wiki.js"></script>
<script src="app.js"></script>
</body>
</html>
