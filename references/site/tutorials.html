<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <title>Tutorials — Creative Studio, a Claude Code plugin</title>
  <meta name="description" content="The Creative Studio wiki — install, the pipeline phase by phase, everyday workflows, integrations, and agents. Video walkthroughs throughout.">
  <link rel="stylesheet" href="assets/styles.css">
  <script>
    /* Enable reveal animations only when JS runs; reveal everything as a
       backstop in case app.js never executes — page is never left blank. */
    document.documentElement.className += ' js';
    addEventListener('load', function () {
      setTimeout(function () {
        if (!window.__revealsReady) {
          document.querySelectorAll('.reveal').forEach(function (e) { e.classList.add('in'); });
        }
      }, 1500);
    });
  </script>
</head>
